<div class="container section-padding">
  <div class="services-header"><h2>Counselling Services</h2><p>Professional mental health support and guidance.</p></div>
  <div class="services-grid">
    <div class="service-card" *ngFor="let service of services">
      <i [class]="service.icon"></i><h3>{{ service.name }}</h3><p>{{ service.description }}</p>
      <button class="btn-learn">Learn More</button>
    </div>
  </div>
  <div class="cta-section">
    <h3>Ready to Get Started?</h3>
    <button class="btn-book">Book a Session</button>
  </div>
</div>
