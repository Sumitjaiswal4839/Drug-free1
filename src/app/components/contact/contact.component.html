<div class="container section-padding">
  <div class="contact-wrapper">
    <div class="contact-header">
      <h2>Get In Touch</h2>
      <p>Have questions? We're here to help. Contact us anytime.</p>
    </div>

    <div class="contact-content">
      <!-- Contact Form -->
      <div class="contact-form-section">
        <h3>Send us a Message</h3>
        <form [formGroup]="contactForm" (ngSubmit)="submitContact()">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" formControlName="name" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" formControlName="email" placeholder="your&#64;email.com" required>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" formControlName="phone" placeholder="+1 (555) 123-4567">
          </div>

          <div class="form-group">
            <label for="subject">Subject *</label>
            <input type="text" id="subject" formControlName="subject" placeholder="What is this about?" required>
          </div>

          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" formControlName="message" placeholder="Your message..." rows="6" required></textarea>
          </div>

          <button type="submit" class="btn-submit">Send Message</button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="contact-info-section">
        <h3>Contact Information</h3>
        
        <div class="info-card">
          <i class="fa-solid fa-map-location-dot"></i>
          <div>
            <h4>Address</h4>
            <p>123 Wellness Blvd<br>Health City, DR 12345</p>
          </div>
        </div>

        <div class="info-card">
          <i class="fa-solid fa-phone"></i>
          <div>
            <h4>Phone</h4>
            <p>+1 (555) 123-4567</p>
          </div>
        </div>

        <div class="info-card">
          <i class="fa-solid fa-envelope"></i>
          <div>
            <h4>Email</h4>
            <p>info&#64;drugfree.org</p>
          </div>
        </div>

        <div class="info-card">
          <i class="fa-solid fa-clock"></i>
          <div>
            <h4>Hours</h4>
            <p>Mon - Fri: 9:00 AM - 6:00 PM<br>Sat: 10:00 AM - 4:00 PM</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
