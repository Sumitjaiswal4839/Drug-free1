<div class="container section-padding">
  <div class="goals-header">
    <h2>Daily Goals</h2>
    <p>Set and track your daily objectives.</p>
  </div>

  <div class="goals-today">
    <h3>Today's Goals</h3>
    <div class="goal-item" *ngFor="let goal of todaysGoals">
      <div class="goal-checkbox">
        <input type="checkbox" [(ngModel)]="goal.completed" (change)="updateGoal(goal)">
        <span [class.completed]="goal.completed">{{ goal.title }}</span>
      </div>
      <span class="priority" [class]="goal.priority">{{ goal.priority }}</span>
    </div>
  </div>

  <div class="weekly-goals">
    <h3>This Week's Goals</h3>
    <div class="goal-card" *ngFor="let goal of weeklyGoals">
      <h4>{{ goal.title }}</h4>
      <p>{{ goal.description }}</p>
      <div class="progress-bar">
        <div class="progress" [style.width.%]="goal.progress"></div>
      </div>
      <span class="progress-text">{{ goal.progress }}% Complete</span>
    </div>
  </div>

  <div class="add-goal">
    <button class="btn-add" (click)="showAddGoal = !showAddGoal">
      <i class="fa-solid fa-plus"></i> Add New Goal
    </button>
    <div *ngIf="showAddGoal" class="goal-form">
      <input type="text" placeholder="Goal title" [(ngModel)]="newGoal.title">
      <input type="text" placeholder="Description" [(ngModel)]="newGoal.description">
      <button (click)="addGoal()" class="btn-save">Save Goal</button>
    </div>
  </div>
</div>
