<div class="container section-padding">
  <div class="support-header"><h2>Community Support</h2><p>Connect with others on their recovery journey.</p></div>
  <div class="support-groups">
    <div class="group-card" *ngFor="let group of supportGroups">
      <h3>{{ group.name }}</h3><p>{{ group.description }}</p>
      <p class="members">{{ group.members }} members</p>
      <button class="btn-join">Join Group</button>
    </div>
  </div>
</div>
